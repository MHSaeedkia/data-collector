---
services:
    jobmanager:
        build: ./flink/orderbook-consolidator
        container_name: jobmanager
        hostname: jobmanager
        restart: on-failure
        command: jobmanager
        ports:
            - "7070:8081"
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: jobmanager
        volumes:
            - data-collector-jobmanager-logs:/opt/flink/log
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8081/overview" ]
            interval: 10s
            retries: 5

    taskmanager:
        build: ./flink/orderbook-consolidator
        container_name: taskmanager
        hostname: taskmanager
        restart: on-failure
        command: taskmanager
        depends_on:
            jobmanager:
                condition: service_healthy
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: jobmanager
                taskmanager.numberOfTaskSlots: 4
        volumes:
            - data-collector-taskmanager-logs:/opt/flink/log
        networks:
            - data-collector-net

    kafka:
        image: confluentinc/cp-kafka:7.8.0
        container_name: kafka
        hostname: kafka
        restart: on-failure
        ports:
            - "9092:9092" # host access: localhost:9092
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg==
        volumes:
            - data-collector-kafka-data:/var/lib/kafka/data
            - data-collector-kafka-secrets:/etc/kafka/secrets
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list" ]
            interval: 15s
            timeout: 10s
            retries: 5
            start_period: 30s

    schema-registry:
        image: confluentinc/cp-schema-registry:7.6.1
        container_name: schema-registry
        hostname: schema-registry
        restart: on-failure
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "8082:8082" # host: localhost:8082, inside docker: schema-registry:8082
        environment:
            SCHEMA_REGISTRY_HOST_NAME: schema-registry
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
            SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8082
        volumes:
            - data-collector-schema-registry-secrets:/etc/schema-registry/secrets
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8082/subjects" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        hostname: kafka-ui
        restart: on-failure
        depends_on:
            kafka:
                condition: service_healthy
            schema-registry:
                condition: service_healthy
        ports:
            - "8080:8080" # host: localhost:8080
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
            KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8082
            # Input/output topic names don't match Confluent's default TopicNameStrategy
            # (<topic>-value), so without this kafka-ui finds no serde at all for them (empty
            # valueSerde, nothing to pick when producing). Bind each topic pattern to the one
            # canonical registry subject it actually uses instead of registering a subject per
            # topic (see scripts/warmup.sh — only 3 canonical subjects are meant to exist).
            KAFKA_CLUSTERS_0_SERDE_0_NAME: PriceLevelEventAvro
            KAFKA_CLUSTERS_0_SERDE_0_CLASSNAME: com.provectus.kafka.ui.serdes.builtin.sr.SchemaRegistrySerde
            KAFKA_CLUSTERS_0_SERDE_0_TOPICVALUESPATTERN: ^ex[0-9]+-p[0-9]+-(asks|bids)$
            KAFKA_CLUSTERS_0_SERDE_0_PROPERTIES_URL: http://schema-registry:8082
            KAFKA_CLUSTERS_0_SERDE_0_PROPERTIES_SCHEMANAMETEMPLATE: price-level-event
            KAFKA_CLUSTERS_0_SERDE_1_NAME: ConsolidatedOrderBookEventAvro
            KAFKA_CLUSTERS_0_SERDE_1_CLASSNAME: com.provectus.kafka.ui.serdes.builtin.sr.SchemaRegistrySerde
            KAFKA_CLUSTERS_0_SERDE_1_TOPICVALUESPATTERN: ^p[0-9]+-(asks|bids)$
            KAFKA_CLUSTERS_0_SERDE_1_PROPERTIES_URL: http://schema-registry:8082
            KAFKA_CLUSTERS_0_SERDE_1_PROPERTIES_SCHEMANAMETEMPLATE: consolidated-order-book-event
        networks:
            - data-collector-net

    nifi:
        build: ./nifi
        container_name: nifi
        hostname: nifi
        restart: on-failure
        depends_on:
            kafka:
                condition: service_healthy
        environment:
            SINGLE_USER_CREDENTIALS_USERNAME: admin
            SINGLE_USER_CREDENTIALS_PASSWORD: admin123456789
            NIFI_WEB_PROXY_HOST: "192.168.150.104:8443,192.168.150.102:8443,localhost:8443"
            NIFI_JVM_HEAP_INIT: "4g"
            NIFI_JVM_HEAP_MAX: "4g"
        ports:
            - "8443:8443"
            - "8081:8081"
            - "9095:9095"
        volumes:
            - data-collector-nifi-conf:/opt/nifi/nifi-current/conf
            - data-collector-nifi-state:/opt/nifi/nifi-current/state
            - data-collector-nifi-logs:/opt/nifi/nifi-current/logs
            - data-collector-nifi-python-extensions:/opt/nifi/nifi-current/python_extensions
            - data-collector-nifi-database-repository:/opt/nifi/nifi-current/database_repository
            - data-collector-nifi-nar-extensions:/opt/nifi/nifi-current/nar_extensions
            - data-collector-nifi-provenance-repository:/opt/nifi/nifi-current/provenance_repository
            - data-collector-nifi-content-repository:/opt/nifi/nifi-current/content_repository
            - data-collector-nifi-flowfile-repository:/opt/nifi/nifi-current/flowfile_repository
        logging:
            driver: json-file
            options:
                max-size: "1G"
                max-file: "10"
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD-SHELL", "curl -k -s -o /dev/null -w '%{http_code}' https://$(hostname):8443/nifi-api/system-diagnostics | grep -qE '^[2-4]'" ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 90s

    postgres:
        image: postgres:18
        container_name: postgres
        hostname: postgres
        restart: on-failure
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - data-collector-postgres-data:/var/lib/postgresql/18/docker
            - data-collector-postgres-lib:/var/lib/postgresql
            - ./postgres:/docker-entrypoint-initdb.d
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 10s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: redis
        hostname: redis
        restart: on-failure
        command: [ "redis-server", "--appendonly", "yes" ]
        ports:
            - "6379:6379"
        volumes:
            - data-collector-redis-data:/data
        networks:
            - data-collector-net
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis-exporter:
        image: oliver006/redis_exporter:latest
        container_name: redis-exporter
        hostname: redis-exporter
        restart: on-failure
        depends_on:
            redis:
                condition: service_healthy
        environment:
            REDIS_ADDR: "redis://redis:6379"
        ports:
            - "9121:9121"
        networks:
            - data-collector-net

    kafka-exporter:
        image: danielqsj/kafka-exporter:latest
        container_name: kafka-exporter
        hostname: kafka-exporter
        restart: on-failure
        depends_on:
            kafka:
                condition: service_healthy
        command:
            - "--kafka.server=kafka:29092"
        ports:
            - "9308:9308"
        networks:
            - data-collector-net

    web:
        build: ./web
        container_name: orderbook-web
        hostname: orderbook-web
        restart: on-failure
        depends_on:
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy
        ports:
            - "3000:3000" # host: http://localhost:3000
        environment:
            PORT: 3000
            KAFKA_BROKER: kafka:29092
            DATABASE_URL: "postgres://postgres:postgres@postgres:5432/markets"
            SCHEMA_REGISTRY_URL: http://schema-registry:8082
        networks:
            - data-collector-net

volumes:
    data-collector-kafka-data:
    data-collector-kafka-secrets:
    data-collector-schema-registry-secrets:
    data-collector-postgres-data:
    data-collector-postgres-lib:
    data-collector-nifi-conf:
    data-collector-nifi-state:
    data-collector-nifi-logs:
    data-collector-nifi-python-extensions:
    data-collector-nifi-database-repository:
    data-collector-nifi-nar-extensions:
    data-collector-nifi-provenance-repository:
    data-collector-nifi-content-repository:
    data-collector-nifi-flowfile-repository:
    data-collector-jobmanager-logs:
    data-collector-taskmanager-logs:
    data-collector-redis-data:

networks:
    data-collector-net:
        driver: bridge
