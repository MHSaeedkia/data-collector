---
services:
    jobmanager:
        build: ./flink
        container_name: jobmanager
        hostname: jobmanager
        command: jobmanager
        ports:
            - "7070:8081"
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: jobmanager
        networks:
            - data-collector-net
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
            interval: 10s
            retries: 5

    taskmanager:
        build: ./flink
        container_name: taskmanager
        hostname: taskmanager
        command: taskmanager
        depends_on:
            jobmanager:
                condition: service_healthy
        environment:
            FLINK_PROPERTIES: |
                jobmanager.rpc.address: jobmanager
                taskmanager.numberOfTaskSlots: 4
        networks:
            - data-collector-net

    kafka:
        image: confluentinc/cp-kafka:7.8.0
        container_name: kafka
        hostname: kafka
        ports:
            - "9092:9092" # host access: localhost:9092
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg==
        volumes:
            - data-collector-kafka-data:/var/lib/kafka/data
        networks:
            - data-collector-net
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-topics",
                    "--bootstrap-server",
                    "kafka:29092",
                    "--list",
                ]
            interval: 15s
            timeout: 10s
            retries: 5
            start_period: 30s

    schema-registry:
        image: confluentinc/cp-schema-registry:7.6.1
        container_name: schema-registry
        hostname: schema-registry
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "8082:8082" # host: localhost:8082, inside docker: schema-registry:8082
        environment:
            SCHEMA_REGISTRY_HOST_NAME: schema-registry
            SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
            SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8082
        networks:
            - data-collector-net
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8082/subjects"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        hostname: kafka-ui
        depends_on:
            kafka:
                condition: service_healthy
            schema-registry:
                condition: service_healthy
        ports:
            - "8080:8080" # host: localhost:8080
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
            KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8082
        networks:
            - data-collector-net

    nifi:
        build: ./nifi
        container_name: nifi
        hostname: nifi
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "8443:8443"
            - "8081:8081"
        volumes:
            - data-collector-nifi-conf:/opt/nifi/nifi-current/conf
            - data-collector-nifi-state:/opt/nifi/nifi-current/state
            - data-collector-nifi-logs:/opt/nifi/nifi-current/logs
        networks:
            - data-collector-net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -k -s -o /dev/null -w '%{http_code}' https://$(hostname):8443/nifi-api/system-diagnostics | grep -qE '^[2-4]'",
                ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 90s

    postgres:
        image: postgres:18
        container_name: postgres
        hostname: postgres
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - data-collector-postgres-data:/var/lib/postgresql/18/docker
            - ./postgres:/docker-entrypoint-initdb.d
        networks:
            - data-collector-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            retries: 5

    web:
        build: ./web
        container_name: orderbook-web
        hostname: orderbook-web
        depends_on:
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy
        ports:
            - "3000:3000" # host: http://localhost:3000
        environment:
            PORT: 3000
            KAFKA_BROKER: kafka:29092
            DATABASE_URL: "postgres://postgres:postgres@postgres:5432/markets"
        networks:
            - data-collector-net

volumes:
    data-collector-kafka-data:
    data-collector-postgres-data:
    data-collector-nifi-conf:
    data-collector-nifi-state:
    data-collector-nifi-logs:

networks:
    data-collector-net:
        driver: bridge
